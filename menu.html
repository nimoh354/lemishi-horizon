<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mileshi Horizon — Menu</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="video-background">
        <video autoplay loop muted playsinline id="bg-video">
            <source src="bg-mp4" type="video/mp4">
        </video>
        <div class="video-overlay"></div>
    </div>

    <nav class="navbar">
        <div class="logo">MILESHI HORIZON</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="rooms.html">Suites</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>

    <main>
        <section class="section">
            <h2 class="title">Hotel Menu</h2>
            <p class="menu-intro">Explore our chef-curated menu. Click an item to add to your booking request.</p>

            <div class="menu-container">
                <div class="menu-items-wrapper">
                    <div class="menu-grid" id="menuGrid">
                        </div>
                </div>

                <aside class="sidebar">
                    <div class="cart-card">
                        <h3>Your Cart</h3>
                        <div id="cartContainer">
                            <p id="cartEmpty">No items yet.</p>      
                        </div>
                        
                        <div class="cart-actions">
                            <button class="gold-btn w100" id="orderNowBtn">Order / Checkout</button>
                            <button class="gold-btn w100 print-btn" id="printMenuBtn">Print</button>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
